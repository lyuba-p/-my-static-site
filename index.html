<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colexia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'EB Garamond', serif;
      background-color: #1A1210;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-image: url('landing3.jpeg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    .stage::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.28) 0%,
        rgba(0,0,0,0.05) 25%,
        rgba(0,0,0,0.05) 75%,
        rgba(0,0,0,0.32) 100%);
      pointer-events: none;
    }
    .masthead {
      position: absolute;
      top: clamp(3rem, 8vh, 6rem);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
      padding: 0 2rem;
      pointer-events: none;
      z-index: 2;
    }
    .footer {
      position: absolute;
      bottom: clamp(3rem, 8vh, 6rem);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
      padding: 0 2rem;
      pointer-events: none;
      z-index: 2;
    }
    .wordmark {
      color: #F5F0EB;
      font-size: clamp(2.75rem, 9vw, 7rem);
      font-weight: 500;
      letter-spacing: 0.32em;
      margin: 0 0 0.7em 0;
      line-height: 1;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .tagline {
      color: #F5F0EB;
      font-size: clamp(1.1rem, 1.7vw, 1.5rem);
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0.08em;
      margin: 0;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .coming-soon {
      color: #F5F0EB;
      font-size: clamp(0.75rem, 1vw, 0.9rem);
      font-weight: 500;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      margin: 0;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    @media (max-width: 768px) {
      .wordmark { letter-spacing: 0.25em; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="masthead">
      <h1 class="wordmark">COLEXIA</h1>
      <p class="tagline">Curate. Collect. Closet.</p>
    </div>
    <div class="footer">
      <p class="coming-soon">Coming Soon</p>
    </div>
  </div>
</body>
</html>
